# Pre-declared quality thresholds (METHODOLOGY §2.3).
# MUST be fixed before held-out evaluation; never tuned on held-out results.
# Quality regression if either:
#   1) delta_2q >= tau_2q  AND  depth_improvement < tau_depth_improve
#   2) delta_depth >= tau_depth  AND  twoq_improvement < tau_2q_improve
# (Utility-score rule 3 is dropped for the pilot.)

# Relative thresholds (fractions). Conservative starting point; confirm via sensitivity grid.
tau_2q: 0.10            # +10% two-qubit gate count
tau_depth: 0.10         # +10% depth
tau_depth_improve: 0.10 # depth must improve by >=10% to offset 2Q degradation
tau_2q_improve: 0.10    # 2Q must improve by >=10% to offset depth degradation

# Sensitivity grid (pre-declared); report how labels move across these.
sensitivity_grid:
  tau_2q: [0.05, 0.10, 0.20]
  tau_depth: [0.05, 0.10, 0.20]

# Performance screening (METHODOLOGY §2.5) — exploratory for the pilot.
performance:
  stage1_slowdown_threshold: 0.20   # 20% median slowdown flags a suspected regression
  normalized_load_exclude_above: 0.30
